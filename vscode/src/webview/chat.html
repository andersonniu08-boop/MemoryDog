<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemoryDog Chat</title>
<style>
  :root {
    --bg: #1e1e1e; --fg: #d4d4d4; --accent: #007acc;
    --muted: #6a6a6a; --surface: #252526; --border: #3e3e3e;
    --user-bubble: #264f78; --dog-bubble: #333333;
    --tool-color: #4ec9b0; --error: #f44747; --warn: #cca700;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px; height: 100vh;
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* ═══════════ Status / Dog ═══════════ */
  .status-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    min-height: 56px; flex-shrink: 0;
  }
  .dog-sprite {
    width: 42px; height: 80px; flex-shrink: 0;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center center;
    border-radius: 6px;
    transition: background-image 0.2s;
    /* Fallback when sprite not loaded: show paw emoji */
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: var(--muted);
  }
  .dog-sprite.sheet-loaded {
    font-size: 0; /* hide emoji once sprite loads */
  }
  .status-text { font-size: 13px; font-weight: 500; }
  .status-sub { font-size: 11px; color: var(--muted); margin-left: 8px; }

  /* ═══════════ Conversation ═══════════ */
  .conversation {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .message {
    max-width: 75%; padding: 10px 14px; border-radius: 12px;
    line-height: 1.55; word-break: break-word;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  .message.user { background:var(--user-bubble); align-self:flex-end; border-bottom-right-radius:4px; }
  .message.assistant { background:var(--dog-bubble); align-self:flex-start; border-bottom-left-radius:4px; }
  .message pre { background:#1a1a1a; border-radius:6px; padding:10px; margin:6px 0; overflow-x:auto; font-family:'Cascadia Code',monospace; font-size:12px; }
  .message code { font-family:'Cascadia Code',monospace; font-size:12px; background:rgba(255,255,255,0.1); padding:1px 4px; border-radius:3px; }
  .message pre code { background:none; padding:0; }
  .streaming { opacity:0.85; }
  .tool-call { font-size:12px; color:var(--tool-color); padding:4px 8px; background:rgba(78,201,176,0.1); border-left:2px solid var(--tool-color); border-radius:4px; align-self:flex-start; font-family:monospace; max-width:75%; }

  /* ═══════════ Input ═══════════ */
  .input-area {
    border-top:1px solid var(--border); padding:12px 20px;
    display:flex; gap:8px; background:var(--bg); flex-shrink:0;
  }
  .input-area textarea {
    flex:1; background:var(--surface); border:1px solid var(--border);
    color:var(--fg); padding:10px 14px; border-radius:8px;
    font-family:inherit; font-size:13px; resize:none; outline:none;
    min-height:42px; max-height:200px; line-height:1.4;
  }
  .input-area textarea:focus { border-color:var(--accent); }
  .input-area textarea::placeholder { color:var(--muted); }
  .input-area button { background:var(--accent); color:white; border:none; padding:8px 20px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0; }
  .input-area button:hover { opacity:0.85; }
  .input-area button:disabled { opacity:0.4; cursor:not-allowed; }

  /* ═══════════ Welcome / Setup ═══════════ */
  .welcome { text-align:center; padding:60px 20px; color:var(--muted); flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .welcome h2 { font-size:22px; margin-bottom:8px; color:var(--fg); }
  .setup-form { display:flex; flex-direction:column; gap:10px; max-width:400px; width:100%; margin:20px auto; }
  .setup-form input { background:var(--surface); border:1px solid var(--border); color:var(--fg); padding:8px 12px; border-radius:6px; font-size:13px; outline:none; }
  .setup-form input:focus { border-color:var(--accent); }
  .setup-form button { background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; }
  .health-check { max-width:400px; margin:12px auto; padding:12px; background:var(--surface); border-radius:8px; font-size:12px; line-height:2; text-align:left; }
  .setup-hint { margin-top:16px; font-size:12px; color:var(--warn); }
</style>
</head>
<body>

<!-- ═══════════ Status Bar with Dog ═══════════ -->
<div class="status-bar" id="statusBar">
  <div class="dog-sprite" id="dogSprite">🐕</div>
  <div style="flex:1">
    <div class="status-text" id="statusText">Starting…</div>
    <div class="status-sub" id="statusSub"></div>
  </div>
  <span id="settingsBtn" style="cursor:pointer;font-size:16px;padding:4px 8px;opacity:0.6" title="Change API key">⚙</span>
</div>

<!-- ═══════════ Conversation ═══════════ -->
<div class="conversation" id="conversation"></div>

<!-- ═══════════ Input ═══════════ -->
<div class="input-area">
  <textarea id="userInput" placeholder="Message MemoryDog… (Enter to send)" rows="1"></textarea>
  <button id="sendBtn">Send</button>
</div>

<script>
(function(){
  const vscode = acquireVsCodeApi();
  const conversation = document.getElementById("conversation");
  const userInput = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");
  const dogSprite = document.getElementById("dogSprite");
  const statusText = document.getElementById("statusText");
  const statusSub = document.getElementById("statusSub");

  let streamingEl = null, streamingText = "";
  let spriteCfg = null;
  let animFrameId = null;
  let currentState = "sleeping";
  let stateFrameIndex = 0;
  let stateFrameCount = 1;
  let lastFrameTime = 0;

  // ═══════════════════════════════════════════════════
  // Sprite animation engine
  // ═══════════════════════════════════════════════════
  function configureSprite(config) {
    spriteCfg = config;
    loadSpriteImage(config.spriteUrl);
  }

  function loadSpriteImage(url) {
    const img = new Image();
    img.onload = function() {
      // Create a canvas to extract individual frames
      const fw = spriteCfg.frameWidth;
      const fh = spriteCfg.frameHeight;
      const cols = spriteCfg.columns;
      const rows = spriteCfg.rows;

      // Store pre-extracted frame URLs for each (col, row) position
      const frames = {};
      const canvas = document.createElement("canvas");
      canvas.width = fw;
      canvas.height = fh;
      const ctx = canvas.getContext("2d");

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          ctx.clearRect(0, 0, fw, fh);
          ctx.drawImage(img, c*fw, r*fh, fw, fh, 0, 0, fw, fh);
          frames[`${c}_${r}`] = canvas.toDataURL();
        }
      }

      // Store frames for quick access
      spriteCfg.frames = frames;
      spriteCfg.loaded = true;
      dogSprite.classList.add("sheet-loaded");
      setDogFrame(0, 0); // initial frame
      startAnimLoop();
    };
    img.onerror = function() {
      // Keep paw emoji as fallback
      console.warn("Failed to load sprite sheet: " + url);
    };
    img.src = url;
  }

  function setDogFrame(col, row) {
    if (!spriteCfg || !spriteCfg.frames) return;
    const key = `${col}_${row}`;
    const url = spriteCfg.frames[key];
    if (url) {
      dogSprite.style.backgroundImage = `url(${url})`;
      dogSprite.style.backgroundSize = "cover";
      dogSprite.style.backgroundPosition = "center center";
    }
  }

  function setDogState(state) {
    if (currentState === state) return;
    currentState = state;
    stateFrameIndex = 0;
    const entry = (spriteCfg && spriteCfg.states[state]) || { col: 0, row: 0 };
    // Determine frame count: each state has different frame count
    // For MVP, each state = 1 frame (the sprite sheet has 1 frame per state)
    stateFrameCount = 1;
    setDogFrame(entry.col, entry.row);
  }

  function startAnimLoop() {
    if (animFrameId) return;
    lastFrameTime = performance.now();

    function tick(now) {
      animFrameId = requestAnimationFrame(tick);
      const dur = (spriteCfg && spriteCfg.durations && spriteCfg.durations[currentState]) || 900;
      if (now - lastFrameTime >= dur) {
        lastFrameTime = now;
        // Cycle frame within current state
        if (stateFrameCount > 1) {
          stateFrameIndex = (stateFrameIndex + 1) % stateFrameCount;
          const entry = (spriteCfg && spriteCfg.states[currentState]) || { col: 0, row: 0 };
          setDogFrame(entry.col + stateFrameIndex, entry.row);
        }
      }
    }
    requestAnimationFrame(tick);
  }

  // ═══════════════════════════════════════════════════
  // Status display
  // ═══════════════════════════════════════════════════
  function setStatus(state, text, sub) {
    setDogState(state);
    statusText.textContent = text || "Ready";
    statusSub.textContent = sub || "";
  }

  // ═══════════════════════════════════════════════════
  // Helpers
  // ═══════════════════════════════════════════════════
  function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
  function md(t) {
    t = t.replace(/```(\w*)\n([\s\S]*?)```/g, (_,l,c)=>"<pre><code>"+esc(c.trim())+"</code></pre>");
    t = t.replace(/`([^`]+)`/g, "<code>$1</code>");
    t = t.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    t = t.replace(/\*([^*]+)\*/g, "<em>$1</em>");
    return t;
  }
  function scroll() { conversation.scrollTop = conversation.scrollHeight; }
  function setLoading(v) { userInput.disabled=v; sendBtn.disabled=v; if(!v)userInput.focus(); }

  function addMsg(role, content) {
    if (!content) return;
    const el = document.createElement("div");
    el.className = "message " + role;
    if (role === "user") el.textContent = content;
    else el.innerHTML = md(esc(content));
    conversation.appendChild(el); scroll();
  }

  function addTool(text) {
    const el = document.createElement("div");
    el.className = "tool-call"; el.textContent = "🔧 " + text;
    conversation.appendChild(el); scroll();
  }

  function startStream() {
    if (streamingEl) conversation.removeChild(streamingEl);
    streamingEl = document.createElement("div");
    streamingEl.className = "message assistant streaming";
    conversation.appendChild(streamingEl);
    streamingText = "";
  }

  function appendToken(tok) {
    if (!streamingEl) startStream();
    streamingText += tok;
    streamingEl.innerHTML = md(esc(streamingText));
    scroll();
  }

  function finishStream() {
    if (streamingEl) { streamingEl.classList.remove("streaming"); streamingEl = null; streamingText = ""; }
  }

  function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;
    addMsg("user", text);
    userInput.value = ""; userInput.style.height = "auto";
    setLoading(true);
    setStatus("thinking", "Thinking…");
    vscode.postMessage({ type: "chat", text });
  }

  sendBtn.addEventListener("click", sendMessage);
  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 200) + "px";
  });

  // Settings button — re-open setup screen to change API key
  document.getElementById("settingsBtn").addEventListener("click", () => {
    vscode.postMessage({ type: "showSetup" });
  });

  // ═══════════════════════════════════════════════════
  // Message handler
  // ═══════════════════════════════════════════════════
  window.addEventListener("message", (event) => {
    const msg = event.data;
    switch (msg.type) {
      case "sprite_config":
        configureSprite(msg);
        break;
      case "status":
        { const m=msg.text.toLowerCase();
          if (m.includes("fetching")||m.includes("sniffing")) setStatus("sniffing", msg.text);
          else if (m.includes("thinking")) setStatus("thinking", msg.text);
          else if (m.includes("executing")||m.includes("running")||m.includes("tool")) setStatus("running", msg.text);
          else if (m.includes("found")||m.includes("matched")||m.includes("learned")||m.includes("saving")) setStatus("sniffing", msg.text);
        }
        break;
      case "token":
        appendToken(msg.token);
        break;
      case "response":
        finishStream();
        addMsg("assistant", msg.content);
        setLoading(false);
        setStatus("success", "Done");
        setTimeout(() => setStatus("idle", "Ready"), 1000);
        break;
      case "tool":
        addTool(msg.text);
        break;
      case "error":
        finishStream();
        const errEl=document.createElement("div");
        errEl.className="message assistant"; errEl.style.color="#f44747";
        errEl.textContent="❌ "+msg.text;
        conversation.appendChild(errEl);
        setLoading(false);
        setStatus("error","Error");
        setTimeout(()=>setStatus("idle","Ready"),1000);
        break;
      case "ready":
        setLoading(false);
        setStatus("idle","Ready");
        break;
      case "setup":
        showSetup();
        break;
      case "health":
        showHealth(msg);
        break;
      case "setup_error":
        showSetupError(msg.text);
        break;
      case "dog_state":
        setStatus(msg.state, msg.label);
        break;
    }
  });

  // ═══════════════════════════════════════════════════
  // Setup screen
  // ═══════════════════════════════════════════════════
  function showSetup() {
    conversation.innerHTML = `
      <div class="welcome">
        <h2>🐕 MemoryDog</h2>
        <p>A memory-augmented coding agent that gets better the longer you work with it.</p>
        <div class="setup-form">
          <input type="password" id="apiKeyInput" placeholder="Enter your API key (e.g. sk-…)" />
          <input type="text" id="modelInput" placeholder="Model (default: deepseek/deepseek-chat)" />
          <button id="saveConfigBtn">Save &amp; Start</button>
        </div>
        <div id="healthStatus"></div>
        <div class="setup-hint">Or run <code>dog config</code> in the terminal.</div>
      </div>
    `;
    const btn = document.getElementById("saveConfigBtn");
    btn.addEventListener("click", () => {
      const apiKey = document.getElementById("apiKeyInput").value.trim();
      const model = document.getElementById("modelInput").value.trim();
      vscode.postMessage({ type: "setConfig", apiKey, model });
      btn.textContent = "Connecting…"; btn.disabled = true;
    });
  }

  function showHealth(health) {
    const el = document.getElementById("healthStatus");
    if (!el) return;
    const icon = s => s==="ok"?"✅":s==="missing"?"⚠️":"❌";
    const label = s => { if(s==="ok")return"Connected"; if(s==="missing")return"Not set"; return s.replace("error: ",""); };
    el.innerHTML = `<div class="health-check">
      <div>${icon(health.api_key)} API Key: ${label(health.api_key)}</div>
      <div>${icon(health.database)} Database: ${label(health.database)}</div>
      <div>${icon(health.embedding)} Embeddings: ${label(health.embedding)}</div>
    </div>`;
  }

  function showSetupError(msg) {
    const el = document.getElementById("healthStatus");
    if (el) el.innerHTML = `<div class="health-check" style="color:#f44747;">❌ ${esc(msg)}</div>`;
    const btn = document.getElementById("saveConfigBtn");
    if (btn) { btn.textContent = "Retry"; btn.disabled = false; }
  }

  // Request initial state
  vscode.postMessage({ type: "ready" });
})();
</script>
</body>
</html>
