<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instincts</title>
<style>
  :root {
    --bg: #1e1e1e;
    --fg: #d4d4d4;
    --accent: #007acc;
    --muted: #6a6a6a;
    --surface: #252526;
    --border: #3e3e3e;
    --warn: #cca700;
    --success: #4ec9b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 16px;
    font-size: 13px;
  }

  h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .instinct {
    background: var(--surface);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 10px;
    border-left: 3px solid var(--accent);
  }

  .instinct .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .instinct .name {
    font-weight: 600;
    font-size: 13px;
  }

  .instinct .priority {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 8px;
    color: white;
  }

  .priority-high { background: #f44747; }
  .priority-medium { background: var(--warn); }
  .priority-low { background: var(--muted); }

  .instinct .desc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .instinct .prompt-line {
    font-size: 11px;
    color: var(--success);
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    margin-top: 6px;
    background: #1a1a1a;
    padding: 4px 8px;
    border-radius: 4px;
    word-break: break-word;
  }

  .instinct .condition {
    font-size: 10px;
    color: var(--warn);
    margin-top: 4px;
    font-style: italic;
  }

  .instinct .active-badge {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    margin-right: 4px;
    box-shadow: 0 0 6px var(--success);
  }

  .instinct .inactive-badge {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 4px;
  }

  .status {
    text-align: center;
    color: var(--muted);
    font-style: italic;
    padding: 24px 0;
    font-size: 12px;
  }
</style>
</head>
<body>

<h3>⚡ Instincts</h3>
<div id="instincts">
  <div class="status">No instincts loaded.</div>
</div>

<script>
  const vscode = acquireVsCodeApi();

  function priorityClass(p) {
    if (p >= 0.7) return "priority-high";
    if (p >= 0.4) return "priority-medium";
    return "priority-low";
  }

  function renderInstincts(instincts) {
    const container = document.getElementById("instincts");
    if (!instincts || instincts.length === 0) {
      container.innerHTML = '<div class="status">No instincts loaded.</div>';
      return;
    }
    container.innerHTML = instincts
      .map(
        (i) => `
      <div class="instinct">
        <div class="header">
          <span class="name">
            <span class="${i.active ? "active-badge" : "inactive-badge"}"></span>
            ${escapeHtml(i.name)}
          </span>
          <span class="priority ${priorityClass(i.priority)}">
            ${typeof i.priority === "number" ? Math.round(i.priority * 100) + "%" : i.priority}
          </span>
        </div>
        ${i.description ? `<div class="desc">${escapeHtml(i.description)}</div>` : ""}
        ${i.prompt ? `<div class="prompt-line">${escapeHtml(i.prompt)}</div>` : ""}
        ${i.condition ? `<div class="condition">when: ${escapeHtml(i.condition)}</div>` : ""}
      </div>`
      )
      .join("");
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  window.addEventListener("message", (event) => {
    const msg = event.data;
    if (msg.type === "instincts") {
      renderInstincts(msg.instincts);
    }
    if (msg.type === "status") {
      document.getElementById("instincts").innerHTML =
        `<div class="status">${escapeHtml(msg.text)}</div>`;
    }
  });
</script>
</body>
</html>
