services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: memorydog
      POSTGRES_PASSWORD: memorydog
      POSTGRES_DB: memorydog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

volumes:
  pgdata:
